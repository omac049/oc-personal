name: Deploy Portfolio & SEO Resource Center

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install main site dependencies
        run: npm ci

      - name: Typecheck main site
        run: npx tsc --noEmit

      - name: Lint main site
        run: npm run lint

      - name: Audit main site (critical only)
        run: npm audit --audit-level=critical || true

      - name: Install SEO Resources dependencies
        working-directory: seo-resources
        run: npm ci

      - name: Typecheck SEO Resources
        working-directory: seo-resources
        run: npm run typecheck

      - name: Audit SEO Resources (critical only)
        working-directory: seo-resources
        run: npm audit --audit-level=critical || true

  build:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            ./node_modules
            ./seo-resources/node_modules
          key: ${{ runner.os }}-node-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-v2-

      - name: Install main site dependencies
        run: npm ci

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next

      - name: Build Next.js main site
        run: npm run build

      - name: Install SEO Resources dependencies
        working-directory: seo-resources
        run: npm ci

      - name: Build SEO Resource Center
        working-directory: seo-resources
        run: NODE_ENV=production npm run build

      - name: Prepare combined deployment
        run: |
          mkdir -p ./out/seo-resources
          cp -r ./seo-resources/build/* ./out/seo-resources/
          touch ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
